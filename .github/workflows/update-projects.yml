name: Update Hummingbird Packages

on:
  push:
    branches:
      main
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pull-requests: write
  actions: write

jobs:
  build:
    runs-on: macOS-latest
    strategy:
        matrix:
          repo:
            - hummingbird
            - hummingbird-auth
            - hummingbird-compression
            - hummingbird-fluent
            - hummingbird-lambda
            - hummingbird-postgres
            - hummingbird-valkey
            - hummingbird-websocket
            - postgres-migrations
            - swift-jobs
            - swift-jobs-valkey
            - swift-jobs-postgres
            - swift-mustache
            - swift-websocket
    steps:
    - name: App Token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 #v3.2.0
      id: generate-token
      with:
        client-id: ${{ secrets.HB_APP_ID }}
        private-key: ${{ secrets.HB_APP_PRIVATE_KEY }}
    - name: Checkout Project Template
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      with:
        fetch-depth: 1
        path: project-template
    - name: Checkout Target Repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      with:
        ref: main
        fetch-depth: 1
        path: ${{ matrix.repo }}
        repository: hummingbird-project/${{ matrix.repo }}
    - name: Install Dependencies
      run: |
        brew install mint
        mint install hummingbird-project/swift-mustache-cli
        echo "$HOME/.mint/bin" >> $GITHUB_PATH
    - name: Update Target Repository
      run: |
        cd project-template
        ./update.sh ../${{ matrix.repo }}
    - name: Set Commit message
      run: |
        cd project-template
        {
          echo 'GIT_COMMIT_MESSAGE<<EOF'
          git log -1 --pretty=medium
          echo EOF
        } >> "$GITHUB_ENV"
    - name: Create Pull Request
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 #v8.1.1
      with:
        token: ${{ steps.generate-token.outputs.token }}
        path: ${{ matrix.repo }}
        commit-message: 'Update from hummingbird-project-template ${{ github.sha }}'
        committer: GitHub <noreply@github.com>
        author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
        branch: project-template-update
        title: 'Update from Hummingbird Project Template'
        body: |
          ${{ env.GIT_COMMIT_MESSAGE }}
          Automated update of files from https://github.com/hummingbird-project/hummingbird-project-template
        base: main

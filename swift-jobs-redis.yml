ci:
  nightly: false
  enable_tests: true
  linux:
    images: ['swift:5.9', 'swift:5.10', 'swiftlang/swift:nightly-6.0-jammy']
    services: |
      services:
            redis:
              image: redis
              ports:
                - 6379:6379
              options: --entrypoint redis-server
    env:
      entries: |
        REDIS_HOSTNAME: "redis"
  mac: false
swift-version: 5.9
swiftformat-version: 0.53.10
extra-codeowners:
  - thoven87
